<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Card</title>
    <link rel="stylesheet" href="{% static 'css/card1.css' %}">
</head>
<body>
{% for i in data %}
<div class="id-card">
    
    <div class="header">
        <h2>{{i.collage}}</h2>
        <p>Student Identity Card</p>
    </div>

    <div class="photo">
        <img src="{{i.image.url}}" alt="Student Photo">
    </div>

    <div class="details">
        <p><strong>ID:</strong> {{i.id}}</p>
        <p><strong>Name:</strong> {{i.name}}</p>
        <p><strong>Course:</strong> {{i.course}}</p>
        <p><strong>Phone:</strong> {{i.phone}}</p>
        <p><strong>Email:</strong> {{i.email}}</p>
    </div>

    <div class="footer">
        <p>Valid Until: {{i.valid}}</p>
    </div>
 
</div>
   {% endfor %}
</body>
</html>
